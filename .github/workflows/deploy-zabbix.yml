# .github/workflows/deploy-zabbix.yml
name: Deploy Zabbix on AKS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, upgrade, rollback]

env:
  HELM_RELEASE_NAME: zabbix
  NAMESPACE: monitoring
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Add Zabbix Helm repo
        run: |
          helm repo add zabbix-community https://zabbix-community.github.io/helm-zabbix
          helm repo update

      - name: Lint Helm values
        run: |
          helm pull zabbix-community/zabbix --untar --untardir /tmp/zabbix-chart
          helm lint /tmp/zabbix-chart/zabbix \
            -f helm/zabbix-values.yaml

  deploy:
    name: Deploy Zabbix to AKS
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Add Helm repos
        run: |
          helm repo add zabbix-community https://zabbix-community.github.io/helm-zabbix
          helm repo update

      - name: Create namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Create Zabbix secrets
        run: |
          kubectl create secret generic zabbix-db-secret \
            --from-literal=POSTGRES_USER=${{ secrets.ZABBIX_DB_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.ZABBIX_DB_PASSWORD }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy / Upgrade Zabbix
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} zabbix-community/zabbix \
            --namespace ${{ env.NAMESPACE }} \
            --values helm/zabbix-values.yaml \
            --set zabbixServer.enabled=true \
            --set postgresql.auth.existingSecret=zabbix-db-secret \
            --timeout 15m \
            --debug
            # removed --wait and --atomic to prevent timeout failures

      - name: Wait for pods to be ready
        run: |
          echo "Waiting for Zabbix pods to start..."
          kubectl rollout status deployment -n ${{ env.NAMESPACE }} --timeout=15m || true
          kubectl get pods -n ${{ env.NAMESPACE }}

      - name: Verify deployment
        run: bash scripts/verify-deployment.sh ${{ env.NAMESPACE }}

      - name: Output Zabbix URL
        run: |
          echo "### Zabbix Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          EXTERNAL_IP=$(kubectl get svc -n ${{ env.NAMESPACE }} \
            -l "app.kubernetes.io/component=zabbix-web" \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}')
          echo "**Zabbix URL:** http://${EXTERNAL_IP}/zabbix" >> $GITHUB_STEP_SUMMARY
