# .github/workflows/deploy-zabbix.yml
name: Deploy Zabbix on AKS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, upgrade, rollback]

env:
  HELM_RELEASE_NAME: zabbix
  NAMESPACE: monitoring
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Add Zabbix Helm repo
        run: |
          helm repo add zabbix-community https://zabbix-community.github.io/helm-zabbix
          helm repo update

      - name: Lint Helm values
        run: |
          helm pull zabbix-community/zabbix --untar --untardir /tmp/zabbix-chart
          helm lint /tmp/zabbix-chart/zabbix \
            -f helm/zabbix-values.yaml

  deploy:
    name: Deploy Zabbix to AKS
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Add Helm repos
        run: |
          helm repo add zabbix-community https://zabbix-community.github.io/helm-zabbix
          helm repo update

      - name: Create namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Create Zabbix DB secret
        run: |
          kubectl create secret generic zabbix-db-access \
            --from-literal=user=${{ secrets.ZABBIX_DB_USER }} \
            --from-literal=password=${{ secrets.ZABBIX_DB_PASSWORD }} \
            --from-literal=dbname=zabbix \
            --from-literal=host=zabbix-postgresql \
            --from-literal=port=5432 \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
            
      - name: Delete postgresql StatefulSet for recreation
        run: |
          kubectl delete statefulset zabbix-postgresql \
            -n ${{ env.NAMESPACE }} \
            --cascade=orphan || true
          kubectl delete pod zabbix-postgresql-0 \
            -n ${{ env.NAMESPACE }} || true
          echo "Waiting for pod termination..."
          sleep 15
          
      - name: Deploy / Upgrade Zabbix
        run: |
          helm upgrade --install zabbix zabbix-community/zabbix \
            --namespace monitoring \
            --values helm/zabbix-values.yaml \
            --set postgresAccess.existingSecretName=zabbix-db-access \
            --timeout 30m \
            --debug

      - name: Wait for pods to be ready
        run: |
          echo "Waiting for Zabbix pods..."
          sleep 30
          kubectl rollout status deployment/zabbix-zabbix-server \
            -n ${{ env.NAMESPACE }} --timeout=10m || true
          kubectl rollout status deployment/zabbix-zabbix-web \
            -n ${{ env.NAMESPACE }} --timeout=10m || true
          echo "--- Pod Status ---"
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo "--- PVC Status ---"
          kubectl get pvc -n ${{ env.NAMESPACE }}

      - name: Verify deployment
        run: bash scripts/verify-deployment.sh ${{ env.NAMESPACE }}

      - name: Output Zabbix access info
        run: |
          echo "### Zabbix Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** ${{ env.NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Port Forward Command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`kubectl port-forward svc/zabbix-zabbix-web 8080:80 -n ${{ env.NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://localhost:8080" >> $GITHUB_STEP_SUMMARY
          echo "**Default Login:** Admin / zabbix" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pod Status" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.NAMESPACE }} >> $GITHUB_STEP_SUMMARY || true
          echo "### PVC Status" >> $GITHUB_STEP_SUMMARY
          kubectl get pvc -n ${{ env.NAMESPACE }} >> $GITHUB_STEP_SUMMARY || true
